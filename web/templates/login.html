{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto; border: 1px solid var(--border); padding: 2rem; background: var(--gray); border-radius: 6px;">
    <h2 style="margin-top: 0;">Local Portal Access</h2>
    <p style="font-size: 0.85rem; color: #6c757d;">*First time? Entering any credentials will auto-provision that user handle locally.</p>
    {% if error %}
        <div style="color: #dc3545; font-weight: bold; margin-bottom: 1rem; font-size: 0.9rem;">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login" style="display: flex; flex-direction: column; gap: 1rem;">
        <label style="display: flex; flex-direction: column; font-weight: 600; font-size: 0.9rem;">
            Dashboard Admin Username
            <input type="text" name="username" required style="padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; margin-top: 0.25rem;">
        </label>
        <label style="display: flex; flex-direction: column; font-weight: 600; font-size: 0.9rem;">
            Master Access Password
            <input type="password" name="password" required style="padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; margin-top: 0.25rem;">
        </label>
        <button type="submit" class="btn" style="margin-top: 0.5rem;">Authenticate Node</button>
    </form>
</div>
{% endblock %}
